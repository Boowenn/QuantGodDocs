name: QuantGod Docs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quantgod-docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-checks:
    name: Markdown and contract checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Markdown links, formatting, JSON, and script newlines
        run: python scripts/check_docs_links.py --root .

      - name: Validate API contract standalone
        run: python scripts/check_api_contract_matches_backend.py --contract docs/contracts/api-contract.json --min-endpoints 100

      - name: Checkout Backend for cross-repo contract drift check
        uses: actions/checkout@v4
        with:
          repository: BoDUD/QuantGodBackend
          path: backend-checkout

      - name: Validate API contract against Backend routes
        run: python scripts/check_api_contract_matches_backend.py --contract docs/contracts/api-contract.json --backend backend-checkout --strict-extra --min-endpoints 100
      - name: Docs quality gate
        run: python scripts/check_docs_quality_gate.py --root .

      - name: Unit tests
        run: python -m unittest discover tests -v

      - name: Docs split boundary
        run: |
          test ! -d MQL5
          test ! -d Dashboard
          test ! -d tools/ai_analysis
          test ! -d frontend
          test ! -d cloudflare

      - name: Secret hygiene
        run: |
          ! grep -RInE 'TELEGRAM_BOT_TOKEN|OPENROUTER_API_KEY|ghp_[A-Za-z0-9]+' . \
            --exclude-dir=.git \
            --exclude-dir=backend-checkout \
            --exclude='*.md' \
            --exclude='*.json' \
            --exclude='ci.yml' \
            --exclude='check_docs_quality_gate.py'
