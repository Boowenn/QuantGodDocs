name: QuantGod Docs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quantgod-docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-checks:
    name: Markdown and contract checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Markdown links, formatting, and JSON
        run: python scripts/check_docs_links.py --root .

      - name: Validate API contract standalone
        run: python scripts/check_api_contract_matches_backend.py --contract docs/contracts/api-contract.json

      - name: Unit tests
        run: python -m unittest discover tests -v

      - name: Docs split boundary
        run: |
          test ! -d MQL5
          test ! -d Dashboard
          test ! -d tools/ai_analysis
          test ! -d frontend
          test ! -d cloudflare

      - name: Secret hygiene
        run: |
          ! grep -RInE 'TELEGRAM_BOT_TOKEN|OPENROUTER_API_KEY|ghp_[A-Za-z0-9]+' . \
            --exclude-dir=.git \
            --exclude='*.json' \
            --exclude='ci.yml'
